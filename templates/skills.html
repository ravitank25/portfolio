{% extends 'base.html' %} {% block title %}Skills{% endblock %} {% block content
%}

<div class="container py-5" style="margin-top: 3rem; margin-bottom: 3rem">
  <h1 style="font-size: 2.5rem; margin-bottom: 3rem">My Skills</h1>

  <div class="row">
    <div class="col-md-6 mb-4">
      <div
        class="card shadow p-4"
        style="
          background: #1a1f2e;
          border-radius: 15px;
          border-left: 5px solid #00d4ff;
        "
      >
        <div style="display: flex; align-items: center; margin-bottom: 1rem">
          <span style="font-size: 2rem; margin-right: 1rem">🐍</span>
          <h5 style="margin: 0; color: #00d4ff">Python</h5>
        </div>
        <div class="progress" style="height: 8px">
          <div class="progress-bar" style="width: 90%">70%</div>
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-4">
      <div
        class="card shadow p-4"
        style="
          background: #1a1f2e;
          border-radius: 15px;
          border-left: 5px solid #00d4ff;
        "
      >
        <div style="display: flex; align-items: center; margin-bottom: 1rem">
          <span style="font-size: 2rem; margin-right: 1rem">🔥</span>
          <h5 style="margin: 0; color: #00d4ff">Flask</h5>
        </div>
        <div class="progress" style="height: 8px">
          <div class="progress-bar bg-success" style="width: 85%">60%</div>
        </div>
      </div>
    </div>

    <div class="col-md-6 mb-4">
      <div
        class="card shadow p-4"
        style="
          background: #1a1f2e;
          border-radius: 15px;
          border-left: 5px solid #ff6b9d;
        "
      >
        <div style="display: flex; align-items: center; margin-bottom: 1rem">
          <span style="font-size: 2rem; margin-right: 1rem">🎯</span>
          <h5 style="margin: 0; color: #ff6b9d">Django</h5>
        </div>
        <div class="progress" style="height: 8px">
          <div class="progress-bar bg-info" style="width: 90%">80%</div>
        </div>
      </div>
    </div>

    {% comment %}
    <div class="col-md-6 mb-4">
      <div
        class="card shadow p-4"
        style="
          background: #1a1f2e;
          border-radius: 15px;
          border-left: 5px solid #ffa500;
        "
      >
        <div style="display: flex; align-items: center; margin-bottom: 1rem">
          <span style="font-size: 2rem; margin-right: 1rem">⚛️</span>
          <h5 style="margin: 0; color: #ffa500">React</h5>
        </div>
        <div class="progress" style="height: 8px">
          <div class="progress-bar bg-warning" style="width: 75%">75%</div>
        </div>
      </div>
    </div>
    {% endcomment %}

    <div class="col-md-6 mb-4">
      <div
        class="card shadow p-4"
        style="
          background: #1a1f2e;
          border-radius: 15px;
          border-left: 5px solid #00d4ff;
        "
      >
        <div style="display: flex; align-items: center; margin-bottom: 1rem">
          <span style="font-size: 2rem; margin-right: 1rem">🎨</span>
          <h5 style="margin: 0; color: #00d4ff">Bootstrap & CSS</h5>
        </div>
        <div class="progress" style="height: 8px">
          <div class="progress-bar" style="width: 88%">88%</div>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
