{% extends 'base.html' %} {% block title %}Thank You{% endblock %} {% block content %}

<div class="container py-5" style="margin-top: 5rem; margin-bottom: 5rem;">
  <div class="row justify-content-center">
    <div class="col-lg-8 text-center">
      <div style="font-size: 5rem; margin-bottom: 2rem; animation: bounce 0.6s ease-in-out;">
        ✅
      </div>

      <h1 style="font-size: 2.5rem; margin-bottom: 1rem; color: #00d4ff;">Thank You!</h1>

      <p style="font-size: 1.2rem; color: #b0b8c1; margin-bottom: 2rem; line-height: 1.8;">
        Your message has been sent successfully. I'll get back to you as soon as possible!
      </p>

      <p style="font-size: 1rem; color: #666; margin-bottom: 3rem;">
        In the meantime, feel free to explore my projects and skills.
      </p>

      <div>
        <a href="/" class="btn btn-primary btn-lg me-2">← Back to Home</a>
        <a href="/projects" class="btn btn-outline-primary btn-lg" style="color: #00d4ff; border-color: #00d4ff;">View Projects</a>
      </div>
    </div>
  </div>
</div>

<style>
  @keyframes bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-20px); }
  }

  .btn-outline-primary {
    color: #00d4ff;
    border-color: #00d4ff;
  }

  .btn-outline-primary:hover {
    background: #00d4ff;
    color: #0f1419;
  }
</style>

{% endblock %}
