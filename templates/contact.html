{% extends 'base.html' %} {% block title %}Contact{% endblock %} {% block content %}

<div class="container py-5" style="margin-top: 3rem; margin-bottom: 3rem;">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">Get In Touch</h1>
      <p style="font-size: 1.1rem; color: #b0b8c1; margin-bottom: 3rem;">Have a question or want to work together? Feel free to reach out!</p>

      <div class="card shadow p-5" style="background: #1a1f2e; border-radius: 15px; border-top: 5px solid #00d4ff;">
        <form method="POST">
          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: #00d4ff;">Your Name</label>
            <input
              type="text"
              name="name"
              placeholder="Enter your full name"
              class="form-control"
              required
              style="border-radius: 10px; padding: 12px;"
            />
          </div>

          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: #00d4ff;">Email Address</label>
            <input
              type="email"
              name="email"
              placeholder="Enter your email"
              class="form-control"
              required
              style="border-radius: 10px; padding: 12px;"
            />
          </div>

          <div class="mb-3">
            <label class="form-label" style="font-weight: 600; color: #00d4ff;">Subject</label>
            <input
              type="text"
              name="subject"
              placeholder="What's this about?"
              class="form-control"
              required
              style="border-radius: 10px; padding: 12px;"
            />
          </div>

          <div class="mb-4">
            <label class="form-label" style="font-weight: 600; color: #00d4ff;">Message</label>
            <textarea
              name="message"
              rows="6"
              class="form-control"
              placeholder="Tell me more..."
              required
              style="border-radius: 10px; padding: 12px;"
            ></textarea>
          </div>

          <button class="btn btn-primary w-100" style="padding: 12px; font-size: 1.05rem; font-weight: 600;">
            Send Message ✈️
          </button>
        </form>
      </div>

      <div style="margin-top: 3rem; text-align: center;">
        <h5 style="color: #00d4ff; margin-bottom: 2rem;">Or Connect With Me On</h5>
        <div>
          <a href="#" class="btn btn-outline-primary btn-sm" style="margin: 0.5rem; color: #00d4ff; border-color: #00d4ff;">LinkedIn</a>
          <a href="#" class="btn btn-outline-primary btn-sm" style="margin: 0.5rem; color: #00d4ff; border-color: #00d4ff;">GitHub</a>
          <a href="#" class="btn btn-outline-primary btn-sm" style="margin: 0.5rem; color: #00d4ff; border-color: #00d4ff;">Twitter</a>
        </div>
      </div>
    </div>
  </div>
</div>

{% endblock %}
